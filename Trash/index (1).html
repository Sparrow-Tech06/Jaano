<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyDrop Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .quiz-card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .option-btn { border-radius: 10px; text-align: left; transition: 0.2s; padding: 14px; font-weight: 500; }
        .option-btn:hover { background-color: #f0f4f8; border-color: #0d6efd; }
    </style>
</head>
<body>

<nav class="navbar navbar-white bg-white shadow-sm mb-4">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand mb-0 h1 fw-bold text-primary">SkyDrop Quiz</span>
        <div>
            <a href="categories.html" class="btn btn-sm btn-light border">Category</a>
            <a href="settings.html" class="btn btn-sm btn-light border">Language</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div id="loader" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="text-muted mt-2">Loading questions...</p>
            </div>

            <div class="card quiz-card p-4 d-none" id="quiz-box">
                <h5 class="fw-bold mb-4" id="question-text">Question goes here?</h5>

                <div class="d-flex flex-column gap-2" id="options-container">
                    </div>

                <button class="btn btn-dark w-100 mt-4 py-2.5 rounded-3 d-none" id="next-btn" onclick="nextQuestion()">Next Question →</button>
            </div>

            <div class="card quiz-card p-5 text-center d-none" id="result-box">
                <h3 class="fw-bold mb-2">Quiz Completed! 🎉</h3>
                <p class="text-muted mb-4">Great effort! You have answered all the questions.</p>
                <button class="btn btn-primary px-4 py-2 rounded-pill" onclick="location.reload()">Play Again</button>
            </div>

        </div>
    </div>
</div>

<script>
    // Configs
    const allCategoriesFallbackList = ["gk", "place", "math"]; // Default files list
    let quizQuestions = [];
    let currentIdx = 0;

    document.addEventListener("DOMContentLoaded", () => {
        const lang = localStorage.getItem("user_lang") || "eng";
        const category = localStorage.getItem("user_category"); // If null, fetches everything

        if (category) {
            loadSingleCategory(lang, category);
        } else {
            loadAllCategories(lang);
        }
    });

    // Case 1: Fetch single JSON file
    function loadSingleCategory(lang, cat) {
        fetch(`lang/${lang}/${cat}.json`)
            .then(res => { if(!res.ok) throw new Error(); return res.json(); })
            .then(data => startQuiz(data))
            .catch(() => showError());
    }

    // Case 2: Fetch multi JSON files asynchronously and combine them
    function loadAllCategories(lang) {
        const fetchPromises = allCategoriesFallbackList.map(cat => 
            fetch(`lang/${lang}/${cat}.json`)
                .then(res => res.ok ? res.json() : [])
                .catch(() => []) // Failed files returns empty array smoothly
        );

        Promise.all(fetchPromises)
            .then(results => {
                const combinedQuestions = results.flat();
                startQuiz(combinedQuestions);
            })
            .catch(() => showError());
    }

    function startQuiz(questions) {
        document.getElementById("loader").classList.add("d-none");
        if(!questions || questions.length === 0) {
            showError("No questions found for this setup.");
            return;
        }
        
        quizQuestions = questions.sort(() => 0.5 - Math.random()); 
        currentIdx = 0;
        
        document.getElementById("quiz-box").classList.remove("d-none");
        showQuestion();
    }

    function showQuestion() {
        document.getElementById("next-btn").classList.add("d-none");
        const currentQ = quizQuestions[currentIdx];

        // Headers
        document.getElementById("question-text").innerText = currentQ.question;

        // Render Options
        const container = document.getElementById("options-container");
        container.innerHTML = "";

        currentQ.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "btn btn-outline-secondary option-btn text-start w-100";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, currentQ.answer);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedOpt, correctOpt) {
        // Options lock karo taaki user double click na kare
        const allBtns = document.querySelectorAll(".option-btn");
        allBtns.forEach(b => b.disabled = true);

        if (selectedOpt === correctOpt) {
            selectedBtn.className = "btn btn-success option-btn text-start w-100 text-white";
            // Correct answer vibration
            navigator.vibrate?.(60);
        } else {
            selectedBtn.className = "btn btn-danger option-btn text-start w-100 text-white";
            // Wrong answer vibration
            navigator.vibrate?.([120, 50, 120]);
            
            // Correct answer ko highlight karo taaki user seekh sake
            allBtns.forEach(b => {
                if(b.innerText === correctOpt) {
                    b.className = "btn btn-success option-btn text-start w-100 text-white";
                }
            });
        }
        document.getElementById("next-btn").classList.remove("d-none");
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < quizQuestions.length) {
            showQuestion();
        } else {
            // End of Quiz
            document.getElementById("quiz-box").classList.add("d-none");
            document.getElementById("result-box").classList.remove("d-none");
        }
    }

    function showError(msg = "Failed to load data. Please check JSON files setup.") {
        document.getElementById("loader").classList.add("d-none");
        document.getElementById("options-container").innerHTML = `<div class="alert alert-danger">${msg}</div>`;
        document.getElementById("quiz-box").classList.remove("d-none");
    }
</script>
</body>
</html>
