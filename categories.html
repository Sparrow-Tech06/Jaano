<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .cat-btn { cursor: pointer; border-radius: 30px; font-weight: 500; padding: 10px 20px; transition: 0.2s; }
        .active-cat { background-color: #0d6efd !important; color: white !important; }
    </style>
</head>
<body data-current-page="category">

<nav class="navbar navbar-white bg-white shadow-sm mb-4">
    <div class="container">
        <a href="index.html" class="btn btn-sm btn-outline-secondary">← Back to Quiz</a>
        <span class="navbar-brand mb-0 h1 fw-bold">Categories</span>
    </div>
</nav>

<div class="container">
    <h5 class="mb-3 fw-bold">Choose Topic</h5>
    <div id="category-list" class="d-flex flex-wrap gap-2">
        <!-- 'All' button standard fallback ke liye -->
        <button class="btn btn-white border cat-btn" id="cat-all" onclick="selectCategory('all')">All Categories</button>
    </div>
</div>


<script>
    // Aapke system ki saari categories
    const categories = ["gk", "place", "math"];

    document.addEventListener("DOMContentLoaded", () => {
        const listContainer = document.getElementById("category-list");
        const currentCat = localStorage.getItem("user_category") || "all";

        categories.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "btn btn-white border cat-btn";
            btn.id = `cat-${cat}`;
            btn.innerText = cat.toUpperCase();
            btn.onclick = () => selectCategory(cat);
            listContainer.appendChild(btn);
        });

        highlightCategory(currentCat);
    });

    function selectCategory(cat) {
        if(cat === 'all') {
            localStorage.removeItem("user_category"); // Clear it for default mixed behavior
            highlightCategory('all');
        } else {
            localStorage.setItem("user_category", cat);
            highlightCategory(cat);
        }
    }

    function highlightCategory(cat) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
        const activeBtn = document.getElementById(`cat-${cat}`);
        if(activeBtn) activeBtn.classList.add('active-cat');
    }
</script>
</body>
</html>
