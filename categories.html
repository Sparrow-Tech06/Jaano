<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Category</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .category-tag { cursor: pointer; transition: all 0.2s; padding: 10px 20px; border-radius: 30px; font-weight: 500; }
        .category-tag.active { background-color: #0d6efd !important; color: white !important; border-color: #0d6efd !important; }
    </style>
</head>
<body>

<div class="container py-4">
    <h4 class="mb-4 fw-bold">Choose a Category</h4>
    
    <div id="category-container" class="d-flex flex-wrap gap-2"></div>

    <button class="btn btn-dark w-100 mt-5 py-2.5 rounded-3" onclick="goToHome()">Go to Home</button>
</div>

<script>
    // Aapki available JSON files ki list (bina .json extension ke)
    const categories = ["gk", "place", "math", "history", "science"];

    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("category-container");
        const savedCategory = localStorage.getItem("user_category") || "gk"; // Default gk

        categories.forEach(cat => {
            const badge = document.createElement("span");
            badge.className = `badge bg-white text-dark border category-tag fs-6`;
            badge.innerText = cat.toUpperCase();
            badge.setAttribute("data-cat", cat);
            
            if(cat === savedCategory) {
                badge.classList.add("active");
            }

            badge.onclick = function() {
                document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                localStorage.setItem("user_category", cat);
            };

            container.appendChild(badge);
        });
    });

    function goToHome() {
        window.location.href = "index.html";
    }
</script>
</body>
</html>
