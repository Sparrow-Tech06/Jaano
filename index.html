<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyDrop Quiz</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
    <link rel="stylesheet" href="css/global.css"> 
    
</head>
<body data-current-page="index" >

<header class="header d-flex justify-content-between align-items-center px-3 py-2">

  <!-- Brand -->
  <h1 class="brand m-0"> Jaano </h1>

  <!-- Right Icons -->
  <nav class="d-flex align-items-center gap-2">
    <!-- Notifications -->
    <a href="notifications/notifications.html" class="back-btn">
      <i class="bi bi-bell"></i>
    </a>
  </nav>

</header>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div id="loader" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="text-muted mt-2">Loading questions...</p>
            </div>

            <div class="card quiz-card p-4 d-none" id="quiz-box">
                <h5 class="question" id="question-text">Question goes here?</h5>
                <div class="d-flex flex-column gap-2" id="options-container">
                    </div>
            </div>

            <div class="card quiz-card p-5 text-center d-none" id="result-box">
                <h3 class="fw-bold mb-2">Quiz Completed! 🎉</h3>
                <p class="text-muted mb-4">Great effort! You have answered all the questions.</p>
                <button class="btn btn-primary px-4 py-2 rounded-pill" onclick="location.reload()">Play Again</button>
            </div>

        </div>
    </div>
</div>

<script src="js/navbar.js"></script>

<script>
    // Configs
    const allCategoriesFallbackList = ["gk", "place", "math"]; // Default files list
    let quizQuestions = [];
    let currentIdx = 0;

    document.addEventListener("DOMContentLoaded", () => {
        const lang = localStorage.getItem("user_lang") || "eng";
        const category = localStorage.getItem("user_category");

        if (category) {
            loadSingleCategory(lang, category);
        } else {
            loadAllCategories(lang);
        }
    });

    function loadSingleCategory(lang, cat) {
        fetch(`lang/${lang}/${cat}.json`)
            .then(res => { if(!res.ok) throw new Error(); return res.json(); })
            .then(data => startQuiz(data))
            .catch(() => showError());
    }

    function loadAllCategories(lang) {
        const fetchPromises = allCategoriesFallbackList.map(cat => 
            fetch(`lang/${lang}/${cat}.json`)
                .then(res => res.ok ? res.json() : [])
                .catch(() => [])
        );

        Promise.all(fetchPromises)
            .then(results => {
                const combinedQuestions = results.flat();
                startQuiz(combinedQuestions);
            })
            .catch(() => showError());
    }

    function startQuiz(questions) {
        document.getElementById("loader").classList.add("d-none");
        if(!questions || questions.length === 0) {
            showError("No questions found for this setup.");
            return;
        }
        
        quizQuestions = questions.sort(() => 0.5 - Math.random()); 
        currentIdx = 0;
        
        document.getElementById("quiz-box").classList.remove("d-none");
        showQuestion();
    }

    function showQuestion() {
        const quizBox = document.getElementById("quiz-box");
        
        // Naye question ke liye fade-in class lagao aur purani reset karo
        quizBox.classList.remove("fade-in");
        void quizBox.offsetWidth; // DOM reflow trigger karne ke liye taaki animation firse chale
        quizBox.classList.add("fade-in");

        const currentQ = quizQuestions[currentIdx];
        document.getElementById("question-text").innerText = currentQ.question;

        const container = document.getElementById("options-container");
        container.innerHTML = "";

        currentQ.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "btn btn-outline-secondary option-btn text-start w-100";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, currentQ.answer);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedOpt, correctOpt) {
        const allBtns = document.querySelectorAll(".option-btn");
        allBtns.forEach(b => b.disabled = true);

        if (selectedOpt === correctOpt) {
            selectedBtn.className = "btn btn-success option-btn text-start w-100";
            navigator.vibrate?.(60);
        } else {
            selectedBtn.className = "btn btn-danger option-btn text-start w-100";
            navigator.vibrate?.([120, 50, 120]);
            
            allBtns.forEach(b => {
                if(b.innerText === correctOpt) {
                    b.className = "btn btn-success option-btn text-start w-100";
                }
            });
        }

        // 1 second baad auto next question par shift karein
        setTimeout(() => {
            nextQuestion();
        }, 1000);
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < quizQuestions.length) {
            showQuestion();
        } else {
            document.getElementById("quiz-box").classList.add("d-none");
            document.getElementById("result-box").classList.remove("d-none");
            document.getElementById("result-box").classList.add("fade-in");
        }
    }

    function showError(msg = "Failed to load data. Please check JSON files setup.") {
        document.getElementById("loader").classList.add("d-none");
        document.getElementById("options-container").innerHTML = `<div class="alert alert-danger">${msg}</div>`;
        document.getElementById("quiz-box").classList.remove("d-none");
    }
</script>
</body>
</html>
