<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Language</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .lang-card { cursor: pointer; transition: 0.2s; border-radius: 12px; }
        .selected { border: 2px solid #0d6efd; background-color: #e7f1ff; }
    </style>
</head>
    
<body data-current-page="setting">

<nav class="navbar navbar-white bg-white shadow-sm mb-4">
    <div class="container">
        <a href="index.html" class="btn btn-sm btn-outline-secondary">← Back to Quiz</a>
        <span class="navbar-brand mb-0 h1 fw-bold">Settings</span>
    </div>
</nav>

<div class="container">
    <h5 class="mb-3 fw-bold">Select Quiz Language</h5>
    <div class="d-flex flex-column gap-3">
        <!-- English -->
        <div class="card lang-card p-3 d-flex flex-row justify-content-between align-items-center" id="card-eng" onclick="saveLanguage('eng')">
            <h6 class="mb-0 fw-semibold">English</h6>
            <span class="badge bg-secondary">Default</span>
        </div>
        <!-- Hindi -->
        <div class="card lang-card p-3 d-flex flex-row justify-content-between align-items-center" id="card-hindi" onclick="saveLanguage('hindi')">
            <h6 class="mb-0 fw-semibold">हिन्दी (Hindi)</h6>
        </div>
        <!-- Bengali -->
        <div class="card lang-card p-3 d-flex flex-row justify-content-between align-items-center" id="card-bang" onclick="saveLanguage('bang')">
            <h6 class="mb-0 fw-semibold">বাংলা (Bengali)</h6>
        </div>
    </div>
</div>
    

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const currentLang = localStorage.getItem("user_lang") || "eng";
        highlightSelected(currentLang);
    });

    function saveLanguage(lang) {
        // 1. Nayi language save karo
        localStorage.setItem("user_lang", lang);
        
        // 2. [IMPROVEMENT] Purani category ko clear karo taaki automatic 'All Categories' select ho jaye
        localStorage.removeItem("user_category");
        
        // UI update karo
        highlightSelected(lang);
        
        console.log(`Language changed to: ${lang}. Category reset to All.`);
    }

    function highlightSelected(lang) {
        document.querySelectorAll('.lang-card').forEach(card => card.classList.remove('selected'));
        const activeCard = document.getElementById(`card-${lang}`);
        if(activeCard) activeCard.classList.add('selected');
    }
</script>

</body>
</html>
